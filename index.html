<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coffee Date Invite</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #f2c28f, #7a3f1f);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #3b2415;
  padding: 18px;
}

.card {
  width: 100%;
  max-width: 560px;
  background: #fff5e7;
  border-radius: 30px;
  padding: 24px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  text-align: center;
  overflow: hidden;
}

h1 {
  margin: 0;
  color: #5a2f16;
  font-size: 32px;
}

.subtitle {
  color: #7b4b2c;
  margin: 10px 0 20px;
}

/* FIRST LANDING */
.shop-landing {
  animation: fadeIn 0.6s ease;
}

.shop-img {
  width: 100%;
  max-height: 360px;
  object-fit: contain;
  background: transparent;

  mix-blend-mode: multiply;
  filter: brightness(1.08) contrast(1.08);
}

.enter-btn {
  margin-top: 18px;
  border: none;
  padding: 15px 32px;
  border-radius: 999px;
  background: #7b3f1d;
  color: #fff6e8;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 7px 0 #4b2410;
  transition: 0.2s;
}

.enter-btn:hover {
  transform: translateY(-3px);
}

.enter-btn:active {
  transform: translateY(4px);
  box-shadow: 0 3px 0 #4b2410;
}

/* INSIDE SHOP */
.inside-shop {
  display: none;
  animation: fadeIn 0.6s ease;
}

.scene {
  margin-top: 22px;
  min-height: 330px;
  border-radius: 28px;
  overflow: hidden;
  background:
    linear-gradient(#f8e4c7 0 53%, #b87948 53% 100%);
  position: relative;
  border: 2px solid rgba(90,45,15,0.2);
}

.wall-sign {
  margin-top: 18px;
  display: inline-block;
  padding: 10px 28px;
  background: #5b2b12;
  color: #fff0d5;
  border-radius: 999px;
  font-weight: bold;
  box-shadow: 0 6px 0 #321406;
}

.table {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 120px;

  background:
    linear-gradient(
      to bottom,
      #b97a4c,
      #8c4f28
    );

  border-top: 6px solid #d7a06c;

  border-radius: 0;

  box-shadow:
    inset 0 10px 15px rgba(255,255,255,.1),
    0 -5px 20px rgba(0,0,0,.15);
}

.table::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -18px;
  transform: translateX(-50%);
  width: 105%;
  height: 42px;
  background: linear-gradient(#c9864d, #8c4b24);
  border-radius: 50%;
  box-shadow: 0 8px 14px rgba(0,0,0,0.25);
}

.table-items {
  position: absolute;
  width: 100%;
  top: -125px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 60px;
  z-index: 5;
}

.item p {
  margin: 6px 0 0;
  color: #fff3df;
  font-size: 14px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}

.coffee-gif {
  width: 140px;
  height: 140px;
  object-fit: contain;
  filter: drop-shadow(0 12px 10px rgba(0,0,0,0.35));
}

.bell-btn {
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
}

.bell-gif {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: drop-shadow(0 12px 10px rgba(0,0,0,0.35));
  transition: 0.2s;
}

.bell-btn:hover .bell-gif {
  transform: scale(1.08);
}

.bell-btn:active .bell-gif {
  transform: scale(0.92);
}

/* OPTIONS */
.options {
  display: none;
  gap: 14px;
  margin-top: 18px;
  animation: fadeIn 0.5s ease;
}

.option {
  border: none;
  padding: 16px;
  border-radius: 18px;
  background: #7b3f1d;
  color: #fff6e8;
  cursor: pointer;
  font-family: Georgia, serif;
  text-align: left;
  box-shadow: 0 8px 0 #4b2410;
  transition: 0.25s;
}

.option:hover {
  transform: translateY(-3px);
}

.option:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 #4b2410;
}

.option strong {
  display: block;
  font-size: 17px;
  margin-bottom: 6px;
}

.option span {
  font-size: 14px;
  line-height: 1.45;
}

.none-message {
  display: none;
  margin-top: 15px;
  color: #8b1e1e;
  font-weight: bold;
}

.processing,
.receipt {
  display: none;
  margin-top: 22px;
  padding: 22px;
  border-radius: 18px;
  background: #fffaf0;
  border: 2px dashed #8b5a2b;
  font-family: "Courier New", monospace;
  white-space: pre-line;
  text-align: left;
  color: #3b2415;
  font-size: 14px;
}

.hidden {
  display: none !important;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 480px) {
  .card {
    padding: 20px;
  }

  h1 {
    font-size: 26px;
  }

  .scene {
    min-height: 300px;
  }

  .table-items {
    gap: 28px;
    top: -105px;
  }

  .coffee-gif {
    width: 115px;
    height: 115px;
  }

  .bell-gif {
    width: 95px;
    height: 95px;
  }

  .processing,
  .receipt {
    font-size: 12px;
    padding: 18px;
  }
}
</style>
</head>

<body>
    <audio id="bellSound" src="bell.mp3"></audio>
<audio id="printSound" src="print.mp3"></audio>

<div class="card">

  <div class="shop-landing" id="shopLanding">
    <h1>☕ Café Mico</h1>
    <p class="subtitle">A tiny coffee shop made for one special customer.</p>

    <img src="shop.png" class="shop-img" alt="coffee shop">

    <button class="enter-btn" onclick="enterShop()">Enter Shop</button>
  </div>

  <div class="inside-shop" id="insideShop">
    <h1>Welcome inside ☕</h1>
    <p class="subtitle">Coffee is brewing. Ring the bell and choose one of the options.</p>

    <div id="landing">
      <div class="scene">
        <div class="wall-sign">Café Mico</div>

        <div class="table">
          <div class="table-items">
            <div class="item">
              <img src="coffee.gif" class="coffee-gif" alt="brewing coffee">
              <p>brewing...</p>
            </div>

            <div class="item">
              <button class="bell-btn" id="bell" onclick="showOptions()">
                <img src="service.gif" class="bell-gif" alt="service bell">
              </button>
              <p>press the bell</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="options" id="options">
    <button class="option" onclick="chooseOption('Option 1: Coffee together')">
      <strong>Option 1: Coffee together</strong>
      <span>
        I wanna invite you to have coffee.<br>
        Cons: We’ll probably just stare at each other and never talk.
        Like You're looking at a monument of Mico.
      </span>
    </button>

    <button class="option" onclick="chooseOption('Option 2: I bring coffee to you')">
      <strong>Option 2: I bring coffee to you</strong>
      <span>
        I can bring you some coffee there.<br>
        Don’t worry, I have Google Maps hehe.
      </span>
    </button>

    <button class="option" onclick="chooseOption('Option 3: Emergency Coffee Fund')">
      <strong>Option 3: Emergency Coffee Fund</strong>
      <span>
        Since Foodpanda and Grab betrayed your location,
        I can just send the coffee budget through GCash.
      </span>
    </button>

    <button class="option" id="noneBtn" onclick="noneOption()">
      <strong>Option 4: None of the above</strong>
      <span>
        A very risky button. I do not recommend pressing this.
      </span>
    </button>
  </div>

  <div class="none-message" id="noneMessage">
    Sorry, I don’t take none of the aboves.
  </div>

  <div class="processing" id="processing"></div>
  <div class="receipt" id="receipt"></div>

</div>

<script>
const shopLanding = document.getElementById("shopLanding");
const insideShop = document.getElementById("insideShop");
const landing = document.getElementById("landing");
const options = document.getElementById("options");
const processingBox = document.getElementById("processing");
const receiptBox = document.getElementById("receipt");
const noneBtn = document.getElementById("noneBtn");
const noneMessage = document.getElementById("noneMessage");

const bellSound = document.getElementById("bellSound");
const printSound = document.getElementById("printSound");

function playSound(audio) {
  audio.currentTime = 0;
  audio.play().catch(() => {});
}

function enterShop() {
  shopLanding.style.display = "none";
  insideShop.style.display = "block";
}

function showOptions() {
  playSound(bellSound);

  landing.style.display = "none";
  options.style.display = "grid";
}

function noneOption() {
  noneBtn.classList.add("hidden");
  noneMessage.style.display = "block";
}

function chooseOption(selectedOption) {
  options.style.display = "none";
  noneMessage.style.display = "none";

  processingBox.style.display = "block";
  receiptBox.style.display = "none";
  processingBox.textContent = "";

  const steps = [
`━━━━━━━━━━━━━━━━━━
 PROCESSING ORDER
━━━━━━━━━━━━━━━━━━

Processing order...
█░░░░░░░░░ 10%`,

`Checking courage...
████░░░░░░ 40%`,

`Brewing coffee...
███████░░░ 75%`,

`Trying not to panic...
██████████ 100%

Order successfully placed.

Printing receipt...`
  ];

  let index = 0;

const interval = setInterval(() => {

  processingBox.textContent += "\n\n" + steps[index];

  // Last step = Printing receipt...
  if (index === steps.length - 1) {
    printSound.currentTime = 0;
    printSound.play();
  }

  index++;

  if (index === steps.length) {
      clearInterval(interval);

      setTimeout(() => {
        processingBox.style.display = "none";
        playSound(printSound);
        showReceipt(selectedOption);
      }, 1200);
    }
  }, 1000);
}

function showReceipt(selectedOption) {
  receiptBox.style.display = "block";

  receiptBox.textContent =
`━━━━━━━━━━━━━━━━━━
      RECEIPT
━━━━━━━━━━━━━━━━━━

Order Confirmed ✔

Customer:
Pretty Girl

Order:
Coffee Date

Method:
${selectedOption}

Total:
One opportunity for Mico
to stop being shy.

━━━━━━━━━━━━━━━━━━

Please take a screenshot
and send it to me.

This serves as official
evidence that you clicked it.

━━━━━━━━━━━━━━━━━━`;
}
</script>

</body>
</html>
